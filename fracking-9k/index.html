<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>FRACKING 9000</title>
<link rel="stylesheet" href="./styles/game.css">
</head>
<body>

<div id="game-wrap">
  <canvas id="game"></canvas>
  <canvas id="fractal-layer"></canvas>
</div>

<div id="hud" class="hidden">
  <div class="col">
    <div id="score">00</div>
  </div>
  <div class="col right">
    <div id="lives">^^^</div>
    <div id="wave" style="font-size: 11px; opacity: 0.7;">WAVE 1</div>
  </div>
</div>

<div id="touch-controls">
  <div class="touch-left">
    <button class="tbtn" id="btn-left" aria-label="Rotate Left">◄</button>
    <button class="tbtn" id="btn-right" aria-label="Rotate Right">►</button>
  </div>
  <div class="touch-right">
    <div class="row">
      <button class="tbtn thrust" id="btn-thrust" aria-label="Thrust">▲</button>
      <button class="tbtn" id="btn-hyper" aria-label="Hyperspace" style="font-size:12px;">HYP</button>
    </div>
    <div class="row" style="margin-top: 12px;">
      <button class="tbtn fire" id="btn-fire" aria-label="Fire">●</button>
    </div>
  </div>
  <div id="dive-controls" aria-label="Dive Controls">
    <div class="dive-pad">
      <span class="dive-pad-gap" aria-hidden="true"></span>
      <button class="tbtn dive" id="btn-dive-up" aria-label="Pan Up">▲</button>
      <span class="dive-pad-gap" aria-hidden="true"></span>
      <button class="tbtn dive" id="btn-dive-left" aria-label="Pan Left">◄</button>
      <button class="tbtn dive" id="btn-dive-reset" aria-label="Reset Dive View">R</button>
      <button class="tbtn dive" id="btn-dive-right" aria-label="Pan Right">►</button>
      <span class="dive-pad-gap" aria-hidden="true"></span>
      <button class="tbtn dive" id="btn-dive-down" aria-label="Pan Down">▼</button>
      <span class="dive-pad-gap" aria-hidden="true"></span>
    </div>
    <div class="dive-actions">
      <button class="tbtn dive zoom" id="btn-dive-zoom-in" aria-label="Zoom In">+</button>
      <button class="tbtn dive zoom" id="btn-dive-zoom-out" aria-label="Zoom Out">−</button>
      <button class="tbtn dive exit" id="btn-dive-exit" aria-label="Exit Dive">ESC</button>
    </div>
  </div>
</div>

<div id="title-screen" class="overlay">
  <h1 class="title">FRACKING 9000</h1>
  <div class="subtitle">★ FRACK THESE FRACKING FRACTALOIDS *</div>
  <div class="instructions" id="desktop-instr">
    <span class="key">←</span> <span class="key">→</span> rotate &nbsp;
    <span class="key">↑</span> thrust<br>
    <span class="key">SPACE</span> blast &nbsp;
    <span class="key">SHIFT</span> hyperspace
  </div>
  <div class="instructions hidden" id="mobile-instr">
    tap buttons to rotate, thrust,<br>
    fire, and hyperspace<br>
    <span style="opacity:0.6;">Do you have what it takes to be the FRAC KING?</span>
  </div>
  <button class="btn" id="start-btn">PRESS START</button>
  <div class="credit">© 19XX KNIFEtroniks</div>
</div>

<div id="gameover-screen" class="overlay hidden">
  <h1 class="title" style="font-size: clamp(28px, 8vw, 64px);">GAME OVER</h1>
  <div class="subtitle" id="final-score">SCORE: 0</div>
  <div class="instructions">your ship is now space gravel</div>
  <button class="btn" id="restart-btn">TRY AGAIN</button>
</div>

<script src="./scripts/ship-icon.js"></script>
<script src="./scripts/audio.js"></script>
<script src="./scripts/heartbeat.js"></script>
<script src="./scripts/input.js"></script>
<script src="./scripts/fractal-renderer.js"></script>
<script src="./scripts/fun-pack.js"></script>
<script src="./scripts/fractaloid-effects.js"></script>
<script src="./scripts/fractaloid-palette.js"></script>
<script src="./scripts/fractaloid-classes.js"></script>
<script src="./scripts/fractaloid-viewfit.js"></script>
<script src="./scripts/fractaloid-runtime.js"></script>
<script src="./scripts/fractaloid-combat.js"></script>
<script src="./scripts/gameplay-systems.js"></script>
<script src="./scripts/input-feel.js"></script>
<script src="./scripts/threat-cues.js"></script>
<script src="./scripts/perf-metrics.js"></script>
<script src="./scripts/game.js"></script>

</body>
</html>
