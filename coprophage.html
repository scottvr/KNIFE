
<style>
  :root {
    --copro-bg-1: #100904;
    --copro-bg-2: #2a1609;
    --copro-bg-3: #1f1108;
    --copro-ink: #f2d8a4;
    --copro-muted: #cda872;
    --copro-panel: rgba(33, 19, 11, 0.72);
    --copro-line: rgba(255, 237, 201, 0.2);
  }

  #copro-app {
    min-height: 100vh;
    margin: 0;
    display: grid;
    place-items: center;
    background:
      radial-gradient(120% 120% at 50% 0%, #4a2912 0%, #25140a 45%, #130a05 100%),
      linear-gradient(150deg, var(--copro-bg-1), var(--copro-bg-2), var(--copro-bg-3));
    padding: 10px;
    box-sizing: border-box;
    font-family: "Trebuchet MS", "Lucida Sans Unicode", "Segoe UI", sans-serif;
  }

  #copro-stage {
    position: relative;
    width: min(98vw, 98vh);
    height: min(98vw, 98vh);
    max-width: 960px;
    max-height: 960px;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45), inset 0 0 0 1px rgba(255, 235, 190, 0.24);
  }

  #copro-stage::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.02) 0px,
        rgba(255, 255, 255, 0.02) 1px,
        transparent 1px,
        transparent 4px
      );
    mix-blend-mode: soft-light;
    z-index: 2;
  }

  #copro-canvas {
    width: 100%;
    height: 100%;
    display: block;
    background: #2a1a0e;
    touch-action: none;
  }

  #copro-overlay-top {
    position: absolute;
    left: 10px;
    top: 10px;
    right: 10px;
    z-index: 4;
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: flex-start;
    pointer-events: none;
  }

  #copro-hud {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  #copro-hud span {
    display: inline-flex;
    gap: 5px;
    align-items: center;
    background: var(--copro-panel);
    border: 1px solid var(--copro-line);
    border-radius: 999px;
    padding: 7px 12px;
    font: 800 14px/1 "Consolas", "Courier New", monospace;
    color: var(--copro-muted);
    letter-spacing: 0.02em;
    text-transform: uppercase;
    backdrop-filter: blur(2px);
  }

  #copro-hud strong {
    color: var(--copro-ink);
    font-weight: 800;
  }

  #copro-controls {
    display: inline-flex;
    gap: 5px;
    pointer-events: auto;
  }

  #copro-controls button {
    border: 1px solid var(--copro-line);
    color: var(--copro-ink);
    background: var(--copro-panel);
    border-radius: 8px;
    padding: 7px 11px;
    font: 700 12px/1 "Consolas", "Courier New", monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    backdrop-filter: blur(2px);
  }

  #copro-controls button:hover {
    background: rgba(55, 30, 16, 0.85);
  }

  #copro-controls button:disabled {
    opacity: 0.55;
    cursor: default;
  }

  #copro-msg {
    position: absolute;
    z-index: 7;
    left: 50%;
    top: 10px;
    transform: translateX(-50%);
    width: min(50%, 440px);
    text-align: center;
    color: var(--copro-ink);
    background: rgba(20, 10, 5, 0.8);
    border: 1px solid rgba(255, 232, 193, 0.28);
    border-radius: 999px;
    padding: 10px 18px;
    font: 800 22px/1.05 "Trebuchet MS", "Segoe UI", sans-serif;
    line-height: 1.1;
    letter-spacing: 0.01em;
    backdrop-filter: blur(3px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.28);
    text-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #copro-toasts {
    position: absolute;
    z-index: 6;
    top: 58px;
    right: 12px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    max-width: min(44vw, 260px);
    pointer-events: none;
  }

  .copro-toast {
    background: rgba(20, 10, 5, 0.82);
    border: 1px solid rgba(255, 232, 193, 0.3);
    color: var(--copro-ink);
    border-radius: 10px;
    padding: 7px 10px;
    font: 700 13px/1.15 "Consolas", "Courier New", monospace;
    letter-spacing: 0.01em;
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
    transform-origin: top right;
    animation: copro-toast-pop 1.5s ease forwards;
  }

  .copro-toast.level {
    color: #ffe4a8;
    border-color: rgba(255, 206, 100, 0.45);
  }

  .copro-toast.bad {
    color: #ffc8bc;
    border-color: rgba(255, 128, 96, 0.44);
  }

  @keyframes copro-toast-pop {
    0% { opacity: 0; transform: translateY(-8px) scale(0.8); }
    15% { opacity: 1; transform: translateY(0) scale(1.06); }
    25% { transform: translateY(0) scale(1); }
    75% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-4px) scale(0.95); }
  }

  .dpad {
    position: absolute;
    z-index: 5;
    right: 12px;
    bottom: 12px;
    display: grid;
    grid-template-columns: repeat(3, 34px);
    grid-template-rows: repeat(3, 34px);
    gap: 4px;
    padding: 8px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(3px);
    touch-action: manipulation;
    transition: opacity 180ms ease, transform 180ms ease;
  }

  .dpad.is-hidden {
    opacity: 0;
    transform: translateY(8px) scale(0.96);
    pointer-events: none;
  }

  .dpad button {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(255, 255, 255, 0.42);
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.1);
    color: #3d2616;
    font: 700 18px/1 "Consolas", "Courier New", monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    cursor: pointer;
    user-select: none;
  }

  .dpad button:active,
  .dpad button.is-active {
    transform: translateY(1px);
    background: rgba(255, 255, 255, 0.22);
  }

  .dpad .blank {
    border: none;
    background: transparent;
    pointer-events: none;
  }

  @media (max-width: 700px) {
    #copro-stage {
      width: calc(100vw - 8px);
      height: calc(100vw - 8px);
    }

    #copro-overlay-top {
      left: 8px;
      right: 8px;
      top: 8px;
    }

    #copro-hud span {
      font-size: 13px;
      padding: 6px 10px;
    }

    #copro-controls button {
      font-size: 11px;
      padding: 6px 9px;
    }

    #copro-msg {
      left: 50%;
      top: 8px;
      width: min(52%, 280px);
      transform: translateX(-50%);
      text-align: center;
      font-size: 18px;
      padding: 8px 12px;
    }

    #copro-toasts {
      top: 50px;
      right: 8px;
      max-width: 56vw;
      gap: 4px;
    }

    .copro-toast {
      font-size: 12px;
      padding: 6px 8px;
    }

    .dpad {
      grid-template-columns: repeat(3, 38px);
      grid-template-rows: repeat(3, 38px);
      gap: 3px;
      right: 8px;
      bottom: 8px;
      padding: 7px;
    }

    .dpad button {
      width: 38px;
      height: 38px;
    }
  }
</style>
<div id="copro-app">
  <div id="copro-stage">
    <canvas id="copro-canvas" width="700" height="700"></canvas>
    <div id="copro-overlay-top">
      <div id="copro-hud">
        <span>Score <strong id="score">0</strong></span>
        <span>Best <strong id="best">0</strong></span>
        <span>Lvl <strong id="level">1</strong></span>
      </div>
      <div id="copro-controls">
        <button id="btn-start" title="Start (Space)">Start</button>
        <button id="btn-pause" title="Pause (Space)">Pause</button>
        <button id="btn-restart" style="display:none" title="Restart">Reset</button>
      </div>
    </div>
    <div id="copro-msg" aria-live="polite">Press Space to Begin</div>
    <div id="copro-toasts" aria-live="polite" aria-atomic="false"></div>
    <div class="dpad" aria-label="Direction controls">
      <div class="blank"></div>
      <button data-dir="U" aria-label="Up">▲</button>
      <div class="blank"></div>
      <button data-dir="L" aria-label="Left">◀</button>
      <div class="blank"></div>
      <button data-dir="R" aria-label="Right">▶</button>
      <div class="blank"></div>
      <button data-dir="D" aria-label="Down">▼</button>
      <div class="blank"></div>
    </div>
  </div>
</div>
<script>
(function () {
  // Quick tuning knobs:
  // - Lower `MOBILE_COLS` => fewer, larger squares on phones.
  // - Lower `DESKTOP_COLS` => fewer, larger squares on laptops/desktops.
  const IS_COMPACT = window.matchMedia("(max-width: 820px)").matches;
  const IS_TOUCH = window.matchMedia("(hover: none) and (pointer: coarse)").matches;
  const SHOW_DPAD_BY_DEFAULT = IS_COMPACT || IS_TOUCH;
  const MOBILE_COLS = 14;
  const DESKTOP_COLS = 20;
  const COLS = IS_COMPACT ? MOBILE_COLS : DESKTOP_COLS;
  const ROWS = COLS;
  const CELL = IS_COMPACT ? 34 : 32;
  // UI safe bands: top/bottom rows reserved for HUD + status overlays.
  const SAFE_TOP_ROWS = IS_COMPACT ? 2 : 2;
  const SAFE_BOTTOM_ROWS = IS_COMPACT ? 2 : 2;
  const PLAY_COLS = COLS;
  const PLAY_ROWS = ROWS - SAFE_TOP_ROWS - SAFE_BOTTOM_ROWS;
  const PLAY_TOP = SAFE_TOP_ROWS * CELL;
  const PLAY_HEIGHT = PLAY_ROWS * CELL;
  const PLAY_BOTTOM = PLAY_TOP + PLAY_HEIGHT;
  const START_SPEED = 250;
  const SPEED_FACTOR = 12;
  const MIN_SPEED = 70;

  const canvas = document.getElementById("copro-canvas");
  const ctx = canvas.getContext("2d");
  const dpad = document.querySelector(".dpad");
  const msg = document.getElementById("copro-msg");
  const toastHost = document.getElementById("copro-toasts");
  const btnStart = document.getElementById("btn-start");
  const btnPause = document.getElementById("btn-pause");
  const btnRestart = document.getElementById("btn-restart");
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;

  const PALETTE = {
    bg: "#4a2730",
    grid: "#6f4651",
    body: ["#8b6914", "#9a7520", "#a8842b", "#7a5c10", "#8d6b18"],
    head: "#c4a040",
    eye: "#f0e8c0",
    pupil: "#1e1108",
    food: ["#8b3a0f", "#6b4c12", "#5a3d08", "#7a2d07"],
    foodShine: "#f0d890",
    soilDark: "#2a1318",
    segOutline: "#5a3d08",
    text: "#f2d8a4",
    textDim: "#c9a06a",
    death: "#f05f43",
  };

  let snake;
  let dir;
  let nextDir;
  let food;
  let score;
  let best = 0;
  let level;
  let speed;
  let gameState;
  let intervalId;
  let frame;
  let particles;
  let audioCtx = null;
  let audioMaster = null;
  let noiseBuffer = null;
  let musicBus = null;
  let musicTimer = null;
  let musicStep = 0;
  let dpadVisible = SHOW_DPAD_BY_DEFAULT;

  const DIRS = {
    U: { x: 0, y: -1 },
    D: { x: 0, y: 1 },
    L: { x: -1, y: 0 },
    R: { x: 1, y: 0 },
  };

  const BITE_TOASTS = [
    "Snack secured.",
    "Fresh find.",
    "Prime pile.",
    "Gobble complete.",
    "Larva approved.",
    "Compost candy."
  ];

  const BITE_MESSAGES = [
    "Yum Yum!",
    "Delicioso!",
    "Prime Dung!",
    "Chef's Kiss!",
    "So Fresh!",
    "Glorious Morsel!",
    "Compost Deluxe!"
  ];

  const LEVEL_MESSAGES = [
    "Metabolism Up!",
    "Scavenger Supreme!",
    "Larva Ascendant!",
    "Speed Unlocked!"
  ];

  const MUSIC_STEP_MS = 148;
  const MUSIC_SCALE = [0, 3, 5, 7, 10];
  const MUSIC_ROOTS = [36, 36, 38, 38, 41, 41, 43, 43];
  const LEAD_PATTERN = [0, null, 2, null, 4, null, 2, 1, 0, null, 3, null, 4, null, 2, 1];
  const LEAD_SWING = [0, 2, 4, 2, 1, 2, 3, 2];

  function setMessage(text) {
    msg.textContent = text;
  }

  function setDpadVisible(visible, announce) {
    dpadVisible = !!visible;
    dpad.classList.toggle("is-hidden", !dpadVisible);
    if (announce && !IS_COMPACT) {
      pushToast(dpadVisible ? "D-pad on." : "D-pad off.");
    }
  }

  function ensureAudio() {
    const AudioCtor = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtor) return false;
    if (!audioCtx) {
      audioCtx = new AudioCtor();
      audioMaster = audioCtx.createGain();
      audioMaster.gain.value = 1.6;
      audioMaster.connect(audioCtx.destination);

      musicBus = audioCtx.createGain();
      musicBus.gain.value = 2.22;
      musicBus.connect(audioMaster);

      const sampleLen = Math.floor(audioCtx.sampleRate * 0.4);
      noiseBuffer = audioCtx.createBuffer(1, sampleLen, audioCtx.sampleRate);
      const noiseData = noiseBuffer.getChannelData(0);
      for (let i = 0; i < sampleLen; i++) {
        noiseData[i] = (Math.random() * 2 - 1) * 0.9;
      }
    }
    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }
    return true;
  }

  function routeNode(node, volume, start, attack, release) {
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, volume), start + attack);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + attack + release);
    node.connect(gain);
    gain.connect(audioMaster);
    return gain;
  }

  function playSfxBite() {
    if (!ensureAudio()) return;
    const t = audioCtx.currentTime;

    const noise = audioCtx.createBufferSource();
    noise.buffer = noiseBuffer;
    const band = audioCtx.createBiquadFilter();
    band.type = "bandpass";
    band.Q.value = 1.3;
    band.frequency.setValueAtTime(420, t);
    band.frequency.exponentialRampToValueAtTime(210, t + 0.09);
    noise.connect(band);
    routeNode(band, 0.12, t, 0.01, 0.11);
    noise.start(t);
    noise.stop(t + 0.14);

    const plop = audioCtx.createOscillator();
    plop.type = "sine";
    plop.frequency.setValueAtTime(150, t);
    plop.frequency.exponentialRampToValueAtTime(78, t + 0.09);
    routeNode(plop, 0.09, t, 0.004, 0.1);
    plop.start(t);
    plop.stop(t + 0.13);
  }

  function playSfxLevel() {
    if (!ensureAudio()) return;
    const t = audioCtx.currentTime;
    [0, 0.06, 0.12].forEach(function (offset, i) {
      const osc = audioCtx.createOscillator();
      osc.type = "triangle";
      const freq = i === 0 ? 280 : i === 1 ? 360 : 450;
      osc.frequency.setValueAtTime(freq, t + offset);
      routeNode(osc, 0.08, t + offset, 0.004, 0.12);
      osc.start(t + offset);
      osc.stop(t + offset + 0.16);
    });
  }

  function playSfxDeath() {
    if (!ensureAudio()) return;
    const t = audioCtx.currentTime;

    const osc = audioCtx.createOscillator();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(170, t);
    osc.frequency.exponentialRampToValueAtTime(44, t + 0.32);
    routeNode(osc, 0.1, t, 0.01, 0.34);
    osc.start(t);
    osc.stop(t + 0.36);

    const noise = audioCtx.createBufferSource();
    noise.buffer = noiseBuffer;
    const low = audioCtx.createBiquadFilter();
    low.type = "lowpass";
    low.frequency.setValueAtTime(700, t);
    low.frequency.exponentialRampToValueAtTime(180, t + 0.28);
    noise.connect(low);
    routeNode(low, 0.08, t, 0.01, 0.26);
    noise.start(t);
    noise.stop(t + 0.28);
  }

  function playSfxUi(kind) {
    if (!ensureAudio()) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    osc.type = "square";
    const f1 = kind === "pause" ? 190 : 240;
    const f2 = kind === "pause" ? 150 : 310;
    osc.frequency.setValueAtTime(f1, t);
    osc.frequency.exponentialRampToValueAtTime(f2, t + 0.06);
    routeNode(osc, 0.045, t, 0.003, 0.08);
    osc.start(t);
    osc.stop(t + 0.1);
  }

  function midiToFreq(midi) {
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  function playMusicVoice(freq, duration, volume, isBass) {
    if (!ensureAudio()) return;
    const t = audioCtx.currentTime;

    const carrier = audioCtx.createOscillator();
    carrier.type = isBass ? "sawtooth" : "square";
    carrier.frequency.setValueAtTime(freq, t);

    const mod = audioCtx.createOscillator();
    mod.type = "sine";
    mod.frequency.setValueAtTime(isBass ? 26 : 44, t);
    const modGain = audioCtx.createGain();
    modGain.gain.setValueAtTime(freq * (isBass ? 0.22 : 0.12), t);
    modGain.gain.exponentialRampToValueAtTime(freq * (isBass ? 0.11 : 0.05), t + duration * 0.9);
    mod.connect(modGain);
    modGain.connect(carrier.frequency);

    const filter = audioCtx.createBiquadFilter();
    filter.type = "bandpass";
    filter.Q.value = isBass ? 1.8 : 2.2;
    filter.frequency.setValueAtTime(isBass ? 250 : 420, t);
    filter.frequency.exponentialRampToValueAtTime(isBass ? 140 : 260, t + duration);

    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, volume), t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);

    carrier.connect(filter);
    filter.connect(gain);
    gain.connect(musicBus);

    carrier.start(t);
    mod.start(t);
    carrier.stop(t + duration + 0.04);
    mod.stop(t + duration + 0.04);
  }

  function musicTick() {
    if (gameState !== "running") return;

    const step16 = musicStep % 16;
    const root = MUSIC_ROOTS[Math.floor(musicStep / 8) % MUSIC_ROOTS.length];
    const groove = LEAD_SWING[musicStep % LEAD_SWING.length];
    const leadDegree = LEAD_PATTERN[step16];
    const bassHit = step16 % 4 === 0;
    const accent = step16 % 8 === 0;

    if (bassHit) {
      playMusicVoice(midiToFreq(root - 12), 0.24, accent ? 0.065 : 0.052, true);
    }

    if (leadDegree !== null) {
      const leadMidi = root + 12 + MUSIC_SCALE[(leadDegree + groove) % MUSIC_SCALE.length];
      playMusicVoice(midiToFreq(leadMidi), 0.16, accent ? 0.048 : 0.036, false);
    }

    musicStep++;
  }

  function startMusic() {
    if (!ensureAudio()) return;
    if (musicTimer) return;
    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }
    musicTick();
    musicTimer = setInterval(musicTick, MUSIC_STEP_MS);
  }

  function stopMusic() {
    if (!musicTimer) return;
    clearInterval(musicTimer);
    musicTimer = null;
  }

  function pickRandom(items) {
    return items[Math.floor(Math.random() * items.length)];
  }

  function pushToast(text, tone) {
    const toast = document.createElement("div");
    toast.className = "copro-toast" + (tone ? " " + tone : "");
    toast.textContent = text;
    toastHost.appendChild(toast);
    while (toastHost.children.length > 3) {
      toastHost.firstElementChild.remove();
    }
    setTimeout(function () {
      toast.remove();
    }, 1550);
  }

  function init() {
    stopMusic();
    snake = makeInitialSnake();
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    food = spawnFood();
    score = 0;
    level = 1;
    speed = START_SPEED;
    gameState = "idle";
    frame = 0;
    particles = [];
    updateHUD();
    syncControls();
    setDpadVisible(SHOW_DPAD_BY_DEFAULT, false);
    setMessage("Press Space to Begin");
    drawIdle();
  }

  function spawnFood() {
    let pos;
    do {
      pos = {
        x: Math.floor(Math.random() * PLAY_COLS),
        y: Math.floor(Math.random() * PLAY_ROWS),
      };
    } while (snake.some((s) => s.x === pos.x && s.y === pos.y));
    pos.type = Math.floor(Math.random() * PALETTE.food.length);
    return pos;
  }

  function updateHUD() {
    document.getElementById("score").textContent = score;
    document.getElementById("best").textContent = best;
    document.getElementById("level").textContent = level;
  }

  function syncControls() {
    btnRestart.style.display = gameState === "idle" ? "none" : "inline-flex";
    btnPause.textContent = gameState === "paused" ? "Resume" : "Pause";
    btnStart.textContent = "Start";
    btnStart.disabled = gameState === "running";
  }

  function speedForLevel(lvl) {
    return Math.max(MIN_SPEED, START_SPEED - (lvl - 1) * SPEED_FACTOR);
  }

  function resetGame() {
    clearInterval(intervalId);
    stopMusic();
    musicStep = 0;
    snake = makeInitialSnake();
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    food = spawnFood();
    score = 0;
    level = 1;
    speed = START_SPEED;
    frame = 0;
    particles = [];
    updateHUD();
  }

  function startGame() {
    if (gameState === "running") return;
    ensureAudio();
    if (gameState === "idle" || gameState === "dead") resetGame();
    gameState = "running";
    setMessage("Eat the dung.");
    playSfxUi("start");
    startMusic();
    syncControls();
    clearInterval(intervalId);
    intervalId = setInterval(tick, speed);
  }

  function makeInitialSnake() {
    const midX = Math.floor(PLAY_COLS / 2);
    const midY = Math.floor(PLAY_ROWS / 2);
    return [
      { x: midX, y: midY },
      { x: midX - 1, y: midY },
      { x: midX - 2, y: midY },
    ];
  }

  function pauseGame() {
    if (gameState === "running") {
      clearInterval(intervalId);
      stopMusic();
      gameState = "paused";
      setMessage("Paused");
      playSfxUi("pause");
      syncControls();
      draw();
    } else if (gameState === "paused") {
      gameState = "running";
      setMessage("Eat the dung.");
      playSfxUi("start");
      startMusic();
      syncControls();
      intervalId = setInterval(tick, speed);
    }
  }

  function turnTo(next) {
    if (next.x !== -dir.x || next.y !== -dir.y) {
      nextDir = next;
    }
    if (gameState === "idle" || gameState === "dead") {
      startGame();
    }
  }

  function tick() {
    frame++;
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    const hitSelf = snake.slice(1).some((s) => s.x === head.x && s.y === head.y);
    const hitWall = head.x < 0 || head.x >= PLAY_COLS || head.y < 0 || head.y >= PLAY_ROWS;

    if (hitWall || hitSelf) {
      die();
      return;
    }

    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score += 10 * level;
      if (score > best) best = score;
      spawnParticles(food.x, food.y);
      food = spawnFood();
      playSfxBite();
      pushToast(pickRandom(BITE_TOASTS));

      if (score % (50 * level) === 0 && level < 12) {
        level++;
        clearInterval(intervalId);
        speed = speedForLevel(level);
        intervalId = setInterval(tick, speed);
        playSfxLevel();
        setMessage(pickRandom(LEVEL_MESSAGES) + "  L" + level);
        pushToast("Level " + level + " speed boost.", "level");
      } else {
        setMessage(pickRandom(BITE_MESSAGES));
        setTimeout(function () {
          if (gameState === "running") setMessage("Eat the dung.");
        }, 700);
      }
      updateHUD();
    } else {
      snake.pop();
    }

    updateParticles();
    draw();
  }

  function die() {
    gameState = "dead";
    clearInterval(intervalId);
    stopMusic();
    playSfxDeath();
    if (score > best) best = score;
    updateHUD();
    syncControls();
    setMessage("You died. Score " + score);
    pushToast("Larva down.", "bad");
    draw();
    drawDeathOverlay();
  }

  function spawnParticles(gx, gy) {
    for (let i = 0; i < 9; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = 1 + Math.random() * 2.4;
      particles.push({
        x: gx * CELL + CELL / 2,
        y: PLAY_TOP + gy * CELL + CELL / 2,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 16,
        maxLife: 16,
        color: PALETTE.food[Math.floor(Math.random() * PALETTE.food.length)],
      });
    }
  }

  function updateParticles() {
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.life--;
    }
    particles = particles.filter((p) => p.life > 0);
  }

  function drawGrid() {
    const w = canvas.width;
    const h = canvas.height;
    const glow = ctx.createRadialGradient(w * 0.5, h * 0.38, 50, w * 0.5, h * 0.4, w * 0.72);
    glow.addColorStop(0, "#7d525d");
    glow.addColorStop(0.5, PALETTE.bg);
    glow.addColorStop(1, "#2a1318");
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, w, h);

    ctx.fillStyle = "rgba(38, 16, 22, 0.5)";
    ctx.fillRect(0, 0, w, PLAY_TOP);
    ctx.fillRect(0, PLAY_BOTTOM, w, h - PLAY_BOTTOM);

    ctx.fillStyle = "rgba(255, 214, 192, 0.09)";
    ctx.fillRect(0, PLAY_TOP - 1, w, 1);
    ctx.fillRect(0, PLAY_BOTTOM, w, 1);

    ctx.strokeStyle = PALETTE.grid;
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= PLAY_COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(x * CELL, PLAY_TOP);
      ctx.lineTo(x * CELL, PLAY_BOTTOM);
      ctx.stroke();
    }
    for (let y = 0; y <= PLAY_ROWS; y++) {
      ctx.beginPath();
      const rowY = PLAY_TOP + y * CELL;
      ctx.moveTo(0, rowY);
      ctx.lineTo(PLAY_COLS * CELL, rowY);
      ctx.stroke();
    }
    ctx.strokeStyle = PALETTE.soilDark;
    ctx.lineWidth = 2;
    ctx.strokeRect(1, PLAY_TOP + 1, PLAY_COLS * CELL - 2, PLAY_HEIGHT - 2);
  }

  function drawFood() {
    const cx = food.x * CELL + CELL / 2;
    const cy = PLAY_TOP + food.y * CELL + CELL / 2;
    const r = CELL * 0.4;
    const iconScale = IS_COMPACT ? 0.82 : 0.7;
    ctx.save();
    const bob = Math.sin(frame * 0.18) * 1.3;
    ctx.translate(0, bob);
    ctx.fillStyle = PALETTE.food[food.type];
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = PALETTE.segOutline;
    ctx.lineWidth = 0.9;
    ctx.stroke();
    ctx.fillStyle = PALETTE.foodShine;
    ctx.globalAlpha = 0.45;
    ctx.beginPath();
    ctx.ellipse(cx - r * 0.26, cy - r * 0.3, r * 0.22, r * 0.14, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = "rgba(246, 232, 196, 0.95)";
    ctx.beginPath();
    ctx.arc(cx, cy + 0.2, r * 0.68, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(90, 61, 8, 0.45)";
    ctx.lineWidth = 0.7;
    ctx.stroke();
    ctx.font = "bold " + Math.floor(CELL * iconScale) + "px serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "rgba(20,10,5,0.7)";
    ctx.shadowBlur = 2;
    ctx.shadowOffsetY = 1;
    ctx.fillText("💩", cx, cy + 0.5);
    ctx.shadowColor = "transparent";
    ctx.restore();
  }

  function drawSnake() {
    const len = snake.length;
    for (let i = len - 1; i >= 1; i--) {
      const s = snake[i];
      const prev = snake[i - 1];
      const ci = i % PALETTE.body.length;
      const px = s.x * CELL;
      const py = PLAY_TOP + s.y * CELL;
      ctx.fillStyle = PALETTE.body[ci];
      const isEnd = i === len - 1;
      const segR = isEnd ? CELL * 0.28 : CELL * 0.37;
      const cx2 = px + CELL / 2;
      const cy2 = py + CELL / 2;
      ctx.beginPath();
      ctx.ellipse(cx2, cy2, segR, segR * (isEnd ? 0.72 : 0.88), 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = PALETTE.segOutline;
      ctx.lineWidth = 0.7;
      ctx.stroke();
      if (!isEnd) {
        const ncx = prev.x * CELL + CELL / 2;
        const ncy = PLAY_TOP + prev.y * CELL + CELL / 2;
        ctx.beginPath();
        ctx.moveTo(cx2, cy2);
        ctx.lineTo((cx2 + ncx) / 2, (cy2 + ncy) / 2);
        ctx.lineWidth = segR * 1.6;
        ctx.strokeStyle = PALETTE.body[ci];
        ctx.stroke();
      }
    }

    const h = snake[0];
    const hx = h.x * CELL + CELL / 2;
    const hy = PLAY_TOP + h.y * CELL + CELL / 2;
    const hr = CELL * 0.44;
    const angle = Math.atan2(dir.y, dir.x);
    ctx.fillStyle = PALETTE.head;
    ctx.beginPath();
    ctx.ellipse(hx, hy, hr, hr * 0.84, angle, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#4a2e05";
    ctx.lineWidth = 0.9;
    ctx.stroke();
    const ex1x = hx + Math.cos(angle + 0.5) * hr * 0.55;
    const ex1y = hy + Math.sin(angle + 0.5) * hr * 0.55;
    const ex2x = hx + Math.cos(angle - 0.5) * hr * 0.55;
    const ex2y = hy + Math.sin(angle - 0.5) * hr * 0.55;
    ctx.fillStyle = PALETTE.eye;
    ctx.beginPath();
    ctx.arc(ex1x, ex1y, 2.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ex2x, ex2y, 2.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = PALETTE.pupil;
    ctx.beginPath();
    ctx.arc(ex1x + Math.cos(angle) * 0.8, ex1y + Math.sin(angle) * 0.8, 1.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ex2x + Math.cos(angle) * 0.8, ex2y + Math.sin(angle) * 0.8, 1.2, 0, Math.PI * 2);
    ctx.fill();
    if (frame % 18 < 9) {
      const tail = snake[len - 1];
      const preTail = len > 1 ? snake[len - 2] : null;
      const tailAngle = preTail
        ? Math.atan2(tail.y - preTail.y, tail.x - preTail.x)
        : Math.atan2(-dir.y, -dir.x);
      const tailX = tail.x * CELL + CELL / 2;
      const tailY = PLAY_TOP + tail.y * CELL + CELL / 2;
      const baseX = tailX + Math.cos(tailAngle) * CELL * 0.22;
      const baseY = tailY + Math.sin(tailAngle) * CELL * 0.22;
      const plumeLen = CELL * 0.2 + Math.sin(frame * 0.6) * CELL * 0.05;

      ctx.strokeStyle = "#5f3110";
      ctx.lineWidth = 1.3;
      ctx.beginPath();
      ctx.moveTo(baseX, baseY);
      ctx.lineTo(baseX + Math.cos(tailAngle + 0.24) * plumeLen, baseY + Math.sin(tailAngle + 0.24) * plumeLen);
      ctx.moveTo(baseX, baseY);
      ctx.lineTo(baseX + Math.cos(tailAngle - 0.24) * plumeLen, baseY + Math.sin(tailAngle - 0.24) * plumeLen);
      ctx.stroke();

      ctx.fillStyle = "#8b3a0f";
      ctx.beginPath();
      ctx.arc(
        baseX + Math.cos(tailAngle) * (plumeLen + 1.5),
        baseY + Math.sin(tailAngle) * (plumeLen + 1.5),
        1.6,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawDeathOverlay() {
    ctx.fillStyle = "rgba(80,10,0,0.6)";
    ctx.fillRect(0, PLAY_TOP, canvas.width, PLAY_HEIGHT);
    const midY = PLAY_TOP + PLAY_HEIGHT / 2;
    ctx.fillStyle = PALETTE.death;
    ctx.font = "bold 48px Trebuchet MS, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("DEAD", canvas.width / 2, midY - 24);
    ctx.fillStyle = PALETTE.textDim;
    ctx.font = "bold 20px Consolas, monospace";
    ctx.fillText("Score " + score, canvas.width / 2, midY + 26);
  }

  function drawIdle() {
    drawGrid();
    ctx.fillStyle = "rgba(30,17,8,0.72)";
    ctx.fillRect(0, PLAY_TOP, canvas.width, PLAY_HEIGHT);
    const midY = PLAY_TOP + PLAY_HEIGHT / 2;
    ctx.fillStyle = PALETTE.text;
    ctx.font = "bold 62px Trebuchet MS, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("COPROPHAGE", canvas.width / 2, midY - 40);
    ctx.fillStyle = PALETTE.textDim;
    ctx.font = "bold 24px Consolas, monospace";
    ctx.fillText("larva mode engaged", canvas.width / 2, midY + 8);
    ctx.fillText("space, tap, or d-pad", canvas.width / 2, midY + 44);
  }

  function drawPauseOverlay() {
    ctx.fillStyle = "rgba(30,17,8,0.6)";
    ctx.fillRect(0, PLAY_TOP, canvas.width, PLAY_HEIGHT);
    const midY = PLAY_TOP + PLAY_HEIGHT / 2;
    ctx.fillStyle = PALETTE.text;
    ctx.font = "bold 42px Trebuchet MS, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("PAUSED", canvas.width / 2, midY);
  }

  function draw() {
    drawGrid();
    drawFood();
    drawSnake();
    drawParticles();
    if (gameState === "paused") drawPauseOverlay();
  }

  btnStart.addEventListener("click", startGame);
  btnPause.addEventListener("click", pauseGame);
  btnRestart.addEventListener("click", function () {
    resetGame();
    startGame();
  });

  document.querySelectorAll(".dpad button[data-dir]").forEach(function (btn) {
    const press = function (event) {
      event.preventDefault();
      ensureAudio();
      btn.classList.add("is-active");
      const d = DIRS[btn.dataset.dir];
      turnTo(d);
      setTimeout(function () {
        btn.classList.remove("is-active");
      }, 90);
    };
    btn.addEventListener("click", press);
    btn.addEventListener("touchstart", press, { passive: false });
  });

  let pointerStart = null;
  canvas.addEventListener("pointerdown", function (event) {
    ensureAudio();
    pointerStart = { x: event.clientX, y: event.clientY };
    if (gameState === "idle" || gameState === "dead") {
      startGame();
    }
  });
  canvas.addEventListener("pointerup", function (event) {
    if (!pointerStart) return;
    const dx = event.clientX - pointerStart.x;
    const dy = event.clientY - pointerStart.y;
    const absX = Math.abs(dx);
    const absY = Math.abs(dy);
    if (Math.max(absX, absY) > 18) {
      if (absX > absY) turnTo(dx > 0 ? DIRS.R : DIRS.L);
      else turnTo(dy > 0 ? DIRS.D : DIRS.U);
    }
    pointerStart = null;
  });
  canvas.addEventListener("pointercancel", function () {
    pointerStart = null;
  });

  document.addEventListener("keydown", function (e) {
    ensureAudio();
    if (!SHOW_DPAD_BY_DEFAULT && e.key && e.key.toLowerCase() === "v") {
      e.preventDefault();
      setDpadVisible(!dpadVisible, true);
      return;
    }
    const map = {
      ArrowUp: "U",
      ArrowDown: "D",
      ArrowLeft: "L",
      ArrowRight: "R",
      w: "U",
      s: "D",
      a: "L",
      d: "R",
    };
    if (map[e.key]) {
      e.preventDefault();
      turnTo(DIRS[map[e.key]]);
    }
    if (e.code === "Space") {
      e.preventDefault();
      if (gameState === "idle" || gameState === "dead") startGame();
      else pauseGame();
    }
  });

  init();
})();
</script>
