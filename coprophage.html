
<style>
  :root {
    --copro-bg-1: #100904;
    --copro-bg-2: #2a1609;
    --copro-bg-3: #1f1108;
    --copro-ink: #f2d8a4;
    --copro-muted: #cda872;
    --copro-panel: rgba(33, 19, 11, 0.72);
    --copro-line: rgba(255, 237, 201, 0.2);
  }

  #copro-app {
    min-height: 100vh;
    margin: 0;
    display: grid;
    place-items: center;
    background:
      radial-gradient(120% 120% at 50% 0%, #4a2912 0%, #25140a 45%, #130a05 100%),
      linear-gradient(150deg, var(--copro-bg-1), var(--copro-bg-2), var(--copro-bg-3));
    padding: 10px;
    box-sizing: border-box;
    font-family: "Trebuchet MS", "Lucida Sans Unicode", "Segoe UI", sans-serif;
  }

  #copro-stage {
    position: relative;
    width: min(98vw, 98vh);
    height: min(98vw, 98vh);
    max-width: 960px;
    max-height: 960px;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45), inset 0 0 0 1px rgba(255, 235, 190, 0.24);
  }

  #copro-stage::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.02) 0px,
        rgba(255, 255, 255, 0.02) 1px,
        transparent 1px,
        transparent 4px
      );
    mix-blend-mode: soft-light;
    z-index: 2;
  }

  #copro-canvas {
    width: 100%;
    height: 100%;
    display: block;
    background: #2a1a0e;
    touch-action: none;
  }

  #copro-overlay-top {
    position: absolute;
    left: 10px;
    top: 10px;
    right: 10px;
    z-index: 4;
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: flex-start;
    pointer-events: none;
  }

  #copro-hud {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  #copro-hud span {
    display: inline-flex;
    gap: 5px;
    align-items: center;
    background: var(--copro-panel);
    border: 1px solid var(--copro-line);
    border-radius: 999px;
    padding: 7px 12px;
    font: 800 14px/1 "Consolas", "Courier New", monospace;
    color: var(--copro-muted);
    letter-spacing: 0.02em;
    text-transform: uppercase;
    backdrop-filter: blur(2px);
  }

  #copro-hud strong {
    color: var(--copro-ink);
    font-weight: 800;
  }

  #copro-controls {
    display: inline-flex;
    gap: 5px;
    pointer-events: auto;
  }

  #copro-controls button {
    border: 1px solid var(--copro-line);
    color: var(--copro-ink);
    background: var(--copro-panel);
    border-radius: 8px;
    padding: 7px 11px;
    font: 700 12px/1 "Consolas", "Courier New", monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    backdrop-filter: blur(2px);
  }

  #copro-controls button:hover {
    background: rgba(55, 30, 16, 0.85);
  }

  #copro-controls button:disabled {
    opacity: 0.55;
    cursor: default;
  }

  #copro-msg {
    position: absolute;
    z-index: 4;
    left: 12px;
    bottom: 12px;
    transform: none;
    max-width: calc(100% - 160px);
    text-align: left;
    color: var(--copro-ink);
    background: rgba(20, 10, 5, 0.7);
    border: 1px solid rgba(255, 232, 193, 0.23);
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 15px;
    line-height: 1.1;
    letter-spacing: 0.02em;
    backdrop-filter: blur(3px);
  }

  #copro-toasts {
    position: absolute;
    z-index: 6;
    top: 58px;
    right: 12px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    max-width: min(44vw, 260px);
    pointer-events: none;
  }

  .copro-toast {
    background: rgba(20, 10, 5, 0.82);
    border: 1px solid rgba(255, 232, 193, 0.3);
    color: var(--copro-ink);
    border-radius: 10px;
    padding: 7px 10px;
    font: 700 13px/1.15 "Consolas", "Courier New", monospace;
    letter-spacing: 0.01em;
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.28);
    transform-origin: top right;
    animation: copro-toast-pop 1.5s ease forwards;
  }

  .copro-toast.level {
    color: #ffe4a8;
    border-color: rgba(255, 206, 100, 0.45);
  }

  .copro-toast.bad {
    color: #ffc8bc;
    border-color: rgba(255, 128, 96, 0.44);
  }

  @keyframes copro-toast-pop {
    0% { opacity: 0; transform: translateY(-8px) scale(0.8); }
    15% { opacity: 1; transform: translateY(0) scale(1.06); }
    25% { transform: translateY(0) scale(1); }
    75% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-4px) scale(0.95); }
  }

  .dpad {
    position: absolute;
    z-index: 5;
    right: 12px;
    bottom: 12px;
    display: grid;
    grid-template-columns: repeat(3, 34px);
    grid-template-rows: repeat(3, 34px);
    gap: 4px;
    padding: 8px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(3px);
    touch-action: manipulation;
  }

  .dpad button {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(255, 255, 255, 0.42);
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.1);
    color: #3d2616;
    font: 700 18px/1 "Consolas", "Courier New", monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    cursor: pointer;
    user-select: none;
  }

  .dpad button:active,
  .dpad button.is-active {
    transform: translateY(1px);
    background: rgba(255, 255, 255, 0.22);
  }

  .dpad .blank {
    border: none;
    background: transparent;
    pointer-events: none;
  }

  @media (max-width: 700px) {
    #copro-stage {
      width: calc(100vw - 8px);
      height: calc(100vw - 8px);
    }

    #copro-overlay-top {
      left: 8px;
      right: 8px;
      top: 8px;
    }

    #copro-hud span {
      font-size: 13px;
      padding: 6px 10px;
    }

    #copro-controls button {
      font-size: 11px;
      padding: 6px 9px;
    }

    #copro-msg {
      left: 10px;
      transform: none;
      max-width: calc(100% - 148px);
      text-align: left;
      bottom: 8px;
      font-size: 13px;
      padding: 7px 10px;
    }

    #copro-toasts {
      top: 50px;
      right: 8px;
      max-width: 56vw;
      gap: 4px;
    }

    .copro-toast {
      font-size: 12px;
      padding: 6px 8px;
    }

    .dpad {
      grid-template-columns: repeat(3, 38px);
      grid-template-rows: repeat(3, 38px);
      gap: 3px;
      right: 8px;
      bottom: 8px;
      padding: 7px;
    }

    .dpad button {
      width: 38px;
      height: 38px;
    }
  }
</style>
<div id="copro-app">
  <div id="copro-stage">
    <canvas id="copro-canvas" width="700" height="700"></canvas>
    <div id="copro-overlay-top">
      <div id="copro-hud">
        <span>Score <strong id="score">0</strong></span>
        <span>Best <strong id="best">0</strong></span>
        <span>Lvl <strong id="level">1</strong></span>
      </div>
      <div id="copro-controls">
        <button id="btn-start" title="Start (Space)">Start</button>
        <button id="btn-pause" title="Pause (Space)">Pause</button>
        <button id="btn-restart" style="display:none" title="Restart">Reset</button>
      </div>
    </div>
    <div id="copro-msg" aria-live="polite">Press Space, Tap Canvas, or Use D-Pad</div>
    <div id="copro-toasts" aria-live="polite" aria-atomic="false"></div>
    <div class="dpad" aria-label="Direction controls">
      <div class="blank"></div>
      <button data-dir="U" aria-label="Up">▲</button>
      <div class="blank"></div>
      <button data-dir="L" aria-label="Left">◀</button>
      <div class="blank"></div>
      <button data-dir="R" aria-label="Right">▶</button>
      <div class="blank"></div>
      <button data-dir="D" aria-label="Down">▼</button>
      <div class="blank"></div>
    </div>
  </div>
</div>
<script>
(function () {
  // Quick tuning knobs:
  // - Lower `MOBILE_COLS` => fewer, larger squares on phones.
  // - Lower `DESKTOP_COLS` => fewer, larger squares on laptops/desktops.
  const IS_COMPACT = window.matchMedia("(max-width: 820px)").matches;
  const MOBILE_COLS = 14;
  const DESKTOP_COLS = 20;
  const COLS = IS_COMPACT ? MOBILE_COLS : DESKTOP_COLS;
  const ROWS = COLS;
  const CELL = IS_COMPACT ? 34 : 32;
  // UI safe bands: top/bottom rows reserved for HUD + status overlays.
  const SAFE_TOP_ROWS = IS_COMPACT ? 2 : 2;
  const SAFE_BOTTOM_ROWS = IS_COMPACT ? 2 : 2;
  const PLAY_COLS = COLS;
  const PLAY_ROWS = ROWS - SAFE_TOP_ROWS - SAFE_BOTTOM_ROWS;
  const PLAY_TOP = SAFE_TOP_ROWS * CELL;
  const PLAY_HEIGHT = PLAY_ROWS * CELL;
  const PLAY_BOTTOM = PLAY_TOP + PLAY_HEIGHT;
  const START_SPEED = 250;
  const SPEED_FACTOR = 12;
  const MIN_SPEED = 70;

  const canvas = document.getElementById("copro-canvas");
  const ctx = canvas.getContext("2d");
  const msg = document.getElementById("copro-msg");
  const toastHost = document.getElementById("copro-toasts");
  const btnStart = document.getElementById("btn-start");
  const btnPause = document.getElementById("btn-pause");
  const btnRestart = document.getElementById("btn-restart");
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;

  const PALETTE = {
    bg: "#1f1208",
    grid: "#2e1b0f",
    body: ["#8b6914", "#9a7520", "#a8842b", "#7a5c10", "#8d6b18"],
    head: "#c4a040",
    eye: "#f0e8c0",
    pupil: "#1e1108",
    food: ["#8b3a0f", "#6b4c12", "#5a3d08", "#7a2d07"],
    foodShine: "#f0d890",
    soilDark: "#261508",
    segOutline: "#5a3d08",
    text: "#f2d8a4",
    textDim: "#c9a06a",
    death: "#f05f43",
  };

  let snake;
  let dir;
  let nextDir;
  let food;
  let score;
  let best = 0;
  let level;
  let speed;
  let gameState;
  let intervalId;
  let frame;
  let particles;

  const DIRS = {
    U: { x: 0, y: -1 },
    D: { x: 0, y: 1 },
    L: { x: -1, y: 0 },
    R: { x: 1, y: 0 },
  };

  const BITE_TOASTS = [
    "Snack secured.",
    "Fresh find.",
    "Prime pile.",
    "Gobble complete.",
    "Larva approved.",
    "Compost candy."
  ];

  function setMessage(text) {
    msg.textContent = text;
  }

  function pickRandom(items) {
    return items[Math.floor(Math.random() * items.length)];
  }

  function pushToast(text, tone) {
    const toast = document.createElement("div");
    toast.className = "copro-toast" + (tone ? " " + tone : "");
    toast.textContent = text;
    toastHost.appendChild(toast);
    while (toastHost.children.length > 3) {
      toastHost.firstElementChild.remove();
    }
    setTimeout(function () {
      toast.remove();
    }, 1550);
  }

  function init() {
    snake = makeInitialSnake();
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    food = spawnFood();
    score = 0;
    level = 1;
    speed = START_SPEED;
    gameState = "idle";
    frame = 0;
    particles = [];
    updateHUD();
    syncControls();
    drawIdle();
  }

  function spawnFood() {
    let pos;
    do {
      pos = {
        x: Math.floor(Math.random() * PLAY_COLS),
        y: Math.floor(Math.random() * PLAY_ROWS),
      };
    } while (snake.some((s) => s.x === pos.x && s.y === pos.y));
    pos.type = Math.floor(Math.random() * PALETTE.food.length);
    return pos;
  }

  function updateHUD() {
    document.getElementById("score").textContent = score;
    document.getElementById("best").textContent = best;
    document.getElementById("level").textContent = level;
  }

  function syncControls() {
    btnRestart.style.display = gameState === "idle" ? "none" : "inline-flex";
    btnPause.textContent = gameState === "paused" ? "Resume" : "Pause";
    btnStart.textContent = "Start";
    btnStart.disabled = gameState === "running";
  }

  function speedForLevel(lvl) {
    return Math.max(MIN_SPEED, START_SPEED - (lvl - 1) * SPEED_FACTOR);
  }

  function resetGame() {
    clearInterval(intervalId);
    snake = makeInitialSnake();
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    food = spawnFood();
    score = 0;
    level = 1;
    speed = START_SPEED;
    frame = 0;
    particles = [];
    updateHUD();
  }

  function startGame() {
    if (gameState === "running") return;
    if (gameState === "idle" || gameState === "dead") resetGame();
    gameState = "running";
    setMessage("Eat the dung.");
    syncControls();
    clearInterval(intervalId);
    intervalId = setInterval(tick, speed);
  }

  function makeInitialSnake() {
    const midX = Math.floor(PLAY_COLS / 2);
    const midY = Math.floor(PLAY_ROWS / 2);
    return [
      { x: midX, y: midY },
      { x: midX - 1, y: midY },
      { x: midX - 2, y: midY },
    ];
  }

  function pauseGame() {
    if (gameState === "running") {
      clearInterval(intervalId);
      gameState = "paused";
      setMessage("Paused");
      syncControls();
      draw();
    } else if (gameState === "paused") {
      gameState = "running";
      setMessage("Eat the dung.");
      syncControls();
      intervalId = setInterval(tick, speed);
    }
  }

  function turnTo(next) {
    if (next.x !== -dir.x || next.y !== -dir.y) {
      nextDir = next;
    }
    if (gameState === "idle" || gameState === "dead") {
      startGame();
    }
  }

  function tick() {
    frame++;
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    const hitSelf = snake.slice(1).some((s) => s.x === head.x && s.y === head.y);
    const hitWall = head.x < 0 || head.x >= PLAY_COLS || head.y < 0 || head.y >= PLAY_ROWS;

    if (hitWall || hitSelf) {
      die();
      return;
    }

    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score += 10 * level;
      if (score > best) best = score;
      spawnParticles(food.x, food.y);
      food = spawnFood();
      pushToast(pickRandom(BITE_TOASTS));

      if (score % (50 * level) === 0 && level < 12) {
        level++;
        clearInterval(intervalId);
        speed = speedForLevel(level);
        intervalId = setInterval(tick, speed);
        setMessage("Level " + level + " (" + speed + "ms)");
        pushToast("Level " + level + " speed boost.", "level");
      } else {
        setMessage("Crunch.");
        setTimeout(function () {
          if (gameState === "running") setMessage("Eat the dung.");
        }, 550);
      }
      updateHUD();
    } else {
      snake.pop();
    }

    updateParticles();
    draw();
  }

  function die() {
    gameState = "dead";
    clearInterval(intervalId);
    if (score > best) best = score;
    updateHUD();
    syncControls();
    setMessage("You died. Score " + score);
    pushToast("Larva down.", "bad");
    draw();
    drawDeathOverlay();
  }

  function spawnParticles(gx, gy) {
    for (let i = 0; i < 9; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = 1 + Math.random() * 2.4;
      particles.push({
        x: gx * CELL + CELL / 2,
        y: PLAY_TOP + gy * CELL + CELL / 2,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        life: 16,
        maxLife: 16,
        color: PALETTE.food[Math.floor(Math.random() * PALETTE.food.length)],
      });
    }
  }

  function updateParticles() {
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.life--;
    }
    particles = particles.filter((p) => p.life > 0);
  }

  function drawGrid() {
    const w = canvas.width;
    const h = canvas.height;
    const glow = ctx.createRadialGradient(w * 0.5, h * 0.38, 50, w * 0.5, h * 0.4, w * 0.72);
    glow.addColorStop(0, "#382313");
    glow.addColorStop(0.5, PALETTE.bg);
    glow.addColorStop(1, "#160d05");
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, w, h);

    ctx.fillStyle = "rgba(18, 9, 4, 0.52)";
    ctx.fillRect(0, 0, w, PLAY_TOP);
    ctx.fillRect(0, PLAY_BOTTOM, w, h - PLAY_BOTTOM);

    ctx.fillStyle = "rgba(255, 222, 170, 0.06)";
    ctx.fillRect(0, PLAY_TOP - 1, w, 1);
    ctx.fillRect(0, PLAY_BOTTOM, w, 1);

    ctx.strokeStyle = PALETTE.grid;
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= PLAY_COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(x * CELL, PLAY_TOP);
      ctx.lineTo(x * CELL, PLAY_BOTTOM);
      ctx.stroke();
    }
    for (let y = 0; y <= PLAY_ROWS; y++) {
      ctx.beginPath();
      const rowY = PLAY_TOP + y * CELL;
      ctx.moveTo(0, rowY);
      ctx.lineTo(PLAY_COLS * CELL, rowY);
      ctx.stroke();
    }
    ctx.strokeStyle = PALETTE.soilDark;
    ctx.lineWidth = 2;
    ctx.strokeRect(1, PLAY_TOP + 1, PLAY_COLS * CELL - 2, PLAY_HEIGHT - 2);
  }

  function drawFood() {
    const cx = food.x * CELL + CELL / 2;
    const cy = PLAY_TOP + food.y * CELL + CELL / 2;
    const r = CELL * 0.4;
    const iconScale = IS_COMPACT ? 0.82 : 0.7;
    ctx.save();
    const bob = Math.sin(frame * 0.18) * 1.3;
    ctx.translate(0, bob);
    ctx.fillStyle = PALETTE.food[food.type];
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = PALETTE.segOutline;
    ctx.lineWidth = 0.9;
    ctx.stroke();
    ctx.fillStyle = PALETTE.foodShine;
    ctx.globalAlpha = 0.45;
    ctx.beginPath();
    ctx.ellipse(cx - r * 0.26, cy - r * 0.3, r * 0.22, r * 0.14, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = "rgba(246, 232, 196, 0.95)";
    ctx.beginPath();
    ctx.arc(cx, cy + 0.2, r * 0.68, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(90, 61, 8, 0.45)";
    ctx.lineWidth = 0.7;
    ctx.stroke();
    ctx.font = "bold " + Math.floor(CELL * iconScale) + "px serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "rgba(20,10,5,0.7)";
    ctx.shadowBlur = 2;
    ctx.shadowOffsetY = 1;
    ctx.fillText("💩", cx, cy + 0.5);
    ctx.shadowColor = "transparent";
    ctx.restore();
  }

  function drawSnake() {
    const len = snake.length;
    for (let i = len - 1; i >= 1; i--) {
      const s = snake[i];
      const prev = snake[i - 1];
      const ci = i % PALETTE.body.length;
      const px = s.x * CELL;
      const py = PLAY_TOP + s.y * CELL;
      ctx.fillStyle = PALETTE.body[ci];
      const isEnd = i === len - 1;
      const segR = isEnd ? CELL * 0.28 : CELL * 0.37;
      const cx2 = px + CELL / 2;
      const cy2 = py + CELL / 2;
      ctx.beginPath();
      ctx.ellipse(cx2, cy2, segR, segR * (isEnd ? 0.72 : 0.88), 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = PALETTE.segOutline;
      ctx.lineWidth = 0.7;
      ctx.stroke();
      if (!isEnd) {
        const ncx = prev.x * CELL + CELL / 2;
        const ncy = PLAY_TOP + prev.y * CELL + CELL / 2;
        ctx.beginPath();
        ctx.moveTo(cx2, cy2);
        ctx.lineTo((cx2 + ncx) / 2, (cy2 + ncy) / 2);
        ctx.lineWidth = segR * 1.6;
        ctx.strokeStyle = PALETTE.body[ci];
        ctx.stroke();
      }
    }

    const h = snake[0];
    const hx = h.x * CELL + CELL / 2;
    const hy = PLAY_TOP + h.y * CELL + CELL / 2;
    const hr = CELL * 0.44;
    const angle = Math.atan2(dir.y, dir.x);
    ctx.fillStyle = PALETTE.head;
    ctx.beginPath();
    ctx.ellipse(hx, hy, hr, hr * 0.84, angle, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#4a2e05";
    ctx.lineWidth = 0.9;
    ctx.stroke();
    const ex1x = hx + Math.cos(angle + 0.5) * hr * 0.55;
    const ex1y = hy + Math.sin(angle + 0.5) * hr * 0.55;
    const ex2x = hx + Math.cos(angle - 0.5) * hr * 0.55;
    const ex2y = hy + Math.sin(angle - 0.5) * hr * 0.55;
    ctx.fillStyle = PALETTE.eye;
    ctx.beginPath();
    ctx.arc(ex1x, ex1y, 2.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ex2x, ex2y, 2.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = PALETTE.pupil;
    ctx.beginPath();
    ctx.arc(ex1x + Math.cos(angle) * 0.8, ex1y + Math.sin(angle) * 0.8, 1.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ex2x + Math.cos(angle) * 0.8, ex2y + Math.sin(angle) * 0.8, 1.2, 0, Math.PI * 2);
    ctx.fill();
    if (frame % 18 < 9) {
      const tail = snake[len - 1];
      const preTail = len > 1 ? snake[len - 2] : null;
      const tailAngle = preTail
        ? Math.atan2(tail.y - preTail.y, tail.x - preTail.x)
        : Math.atan2(-dir.y, -dir.x);
      const tailX = tail.x * CELL + CELL / 2;
      const tailY = PLAY_TOP + tail.y * CELL + CELL / 2;
      const baseX = tailX + Math.cos(tailAngle) * CELL * 0.22;
      const baseY = tailY + Math.sin(tailAngle) * CELL * 0.22;
      const plumeLen = CELL * 0.2 + Math.sin(frame * 0.6) * CELL * 0.05;

      ctx.strokeStyle = "#5f3110";
      ctx.lineWidth = 1.3;
      ctx.beginPath();
      ctx.moveTo(baseX, baseY);
      ctx.lineTo(baseX + Math.cos(tailAngle + 0.24) * plumeLen, baseY + Math.sin(tailAngle + 0.24) * plumeLen);
      ctx.moveTo(baseX, baseY);
      ctx.lineTo(baseX + Math.cos(tailAngle - 0.24) * plumeLen, baseY + Math.sin(tailAngle - 0.24) * plumeLen);
      ctx.stroke();

      ctx.fillStyle = "#8b3a0f";
      ctx.beginPath();
      ctx.arc(
        baseX + Math.cos(tailAngle) * (plumeLen + 1.5),
        baseY + Math.sin(tailAngle) * (plumeLen + 1.5),
        1.6,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawDeathOverlay() {
    ctx.fillStyle = "rgba(80,10,0,0.6)";
    ctx.fillRect(0, PLAY_TOP, canvas.width, PLAY_HEIGHT);
    const midY = PLAY_TOP + PLAY_HEIGHT / 2;
    ctx.fillStyle = PALETTE.death;
    ctx.font = "bold 48px Trebuchet MS, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("DEAD", canvas.width / 2, midY - 24);
    ctx.fillStyle = PALETTE.textDim;
    ctx.font = "bold 20px Consolas, monospace";
    ctx.fillText("Score " + score, canvas.width / 2, midY + 26);
  }

  function drawIdle() {
    drawGrid();
    ctx.fillStyle = "rgba(30,17,8,0.72)";
    ctx.fillRect(0, PLAY_TOP, canvas.width, PLAY_HEIGHT);
    const midY = PLAY_TOP + PLAY_HEIGHT / 2;
    ctx.fillStyle = PALETTE.text;
    ctx.font = "bold 62px Trebuchet MS, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("COPROPHAGE", canvas.width / 2, midY - 40);
    ctx.fillStyle = PALETTE.textDim;
    ctx.font = "bold 24px Consolas, monospace";
    ctx.fillText("larva mode engaged", canvas.width / 2, midY + 8);
    ctx.fillText("space, tap, or d-pad", canvas.width / 2, midY + 44);
  }

  function drawPauseOverlay() {
    ctx.fillStyle = "rgba(30,17,8,0.6)";
    ctx.fillRect(0, PLAY_TOP, canvas.width, PLAY_HEIGHT);
    const midY = PLAY_TOP + PLAY_HEIGHT / 2;
    ctx.fillStyle = PALETTE.text;
    ctx.font = "bold 42px Trebuchet MS, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("PAUSED", canvas.width / 2, midY);
  }

  function draw() {
    drawGrid();
    drawFood();
    drawSnake();
    drawParticles();
    if (gameState === "paused") drawPauseOverlay();
  }

  btnStart.addEventListener("click", startGame);
  btnPause.addEventListener("click", pauseGame);
  btnRestart.addEventListener("click", function () {
    resetGame();
    startGame();
  });

  document.querySelectorAll(".dpad button[data-dir]").forEach(function (btn) {
    const press = function (event) {
      event.preventDefault();
      btn.classList.add("is-active");
      const d = DIRS[btn.dataset.dir];
      turnTo(d);
      setTimeout(function () {
        btn.classList.remove("is-active");
      }, 90);
    };
    btn.addEventListener("click", press);
    btn.addEventListener("touchstart", press, { passive: false });
  });

  let pointerStart = null;
  canvas.addEventListener("pointerdown", function (event) {
    pointerStart = { x: event.clientX, y: event.clientY };
    if (gameState === "idle" || gameState === "dead") {
      startGame();
    }
  });
  canvas.addEventListener("pointerup", function (event) {
    if (!pointerStart) return;
    const dx = event.clientX - pointerStart.x;
    const dy = event.clientY - pointerStart.y;
    const absX = Math.abs(dx);
    const absY = Math.abs(dy);
    if (Math.max(absX, absY) > 18) {
      if (absX > absY) turnTo(dx > 0 ? DIRS.R : DIRS.L);
      else turnTo(dy > 0 ? DIRS.D : DIRS.U);
    }
    pointerStart = null;
  });
  canvas.addEventListener("pointercancel", function () {
    pointerStart = null;
  });

  document.addEventListener("keydown", function (e) {
    const map = {
      ArrowUp: "U",
      ArrowDown: "D",
      ArrowLeft: "L",
      ArrowRight: "R",
      w: "U",
      s: "D",
      a: "L",
      d: "R",
    };
    if (map[e.key]) {
      e.preventDefault();
      turnTo(DIRS[map[e.key]]);
    }
    if (e.code === "Space") {
      e.preventDefault();
      if (gameState === "idle" || gameState === "dead") startGame();
      else pauseGame();
    }
  });

  init();
})();
</script>
